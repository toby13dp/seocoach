<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SEOCoach</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0f172a;
      color: #e2e8f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
    }
    .loader {
      border: 4px solid #1e293b;
      border-top: 4px solid #3b82f6;
      border-radius: 50%;
      width: 48px;
      height: 48px;
      animation: spin 1s linear infinite;
      margin: 0 auto 24px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    h1 { font-size: 24px; margin-bottom: 8px; color: #f8fafc; }
    p { color: #94a3b8; font-size: 14px; line-height: 1.6; }
    .retry-btn {
      margin-top: 24px;
      padding: 12px 32px;
      background: #3b82f6;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
    }
    .retry-btn:hover { background: #2563eb; }
  </style>
</head>
<body>
  <div>
    <div class="loader"></div>
    <h1>SEOCoach</h1>
    <p>Verbinding maken met server...</p>
    <p id="error-msg" style="display:none; margin-top:16px; color:#f87171;">
      Kan geen verbinding maken. Controleer je internetverbinding.
    </p>
    <button id="retry-btn" class="retry-btn" style="display:none;" onclick="location.reload()">
      Opnieuw proberen
    </button>
  </div>
  <script>
    setTimeout(function() {
      document.querySelector('.loader').style.display = 'none';
      document.getElementById('error-msg').style.display = 'block';
      document.getElementById('retry-btn').style.display = 'inline-block';
    }, 10000);
  </script>
</body>
</html>
